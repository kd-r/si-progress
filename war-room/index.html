<script>
(function(){
  var P = JSON.parse(document.getElementById('payload').textContent);
  function b64d(s){var bin=atob(s);var u=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}
  async function unlock(pw){
    var enc=new TextEncoder();
    var base=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
    var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64d(P.salt),iterations:P.iter,hash:'SHA-256'},
      base,{name:'AES-GCM',length:256},false,['decrypt']);
    var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(P.iv)},key,b64d(P.ct));
    return new TextDecoder().decode(pt);
  }
  var f=document.getElementById('f'),pin=document.getElementById('p'),btn=document.getElementById('b'),err=document.getElementById('e');
  f.addEventListener('submit',function(ev){
    ev.preventDefault();err.textContent='';btn.disabled=true;btn.textContent='Decrypting…';
    unlock(pin.value).then(function(html){
      document.open();document.write(html);document.close();
    }).catch(function(){
      err.textContent='Wrong password.';btn.disabled=false;btn.textContent='Unlock';pin.select();
    });
  });
})();
</script></body></html>
